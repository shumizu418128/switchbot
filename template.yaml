AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SwitchBot CO2 check Lambda scheduled by EventBridge.

Globals:
  Function:
    Runtime: python3.13
    Architectures:
      - x86_64
    MemorySize: 128
    Timeout: 60

Parameters:
  Token:
    Type: String
    NoEcho: true
  ClientSecret:
    Type: String
    NoEcho: true
  SlackWebhookUrl:
    Type: String
    NoEcho: true
  SwitchBotApiBaseUrl:
    Type: String
    Default: https://api.switch-bot.com

Resources:
  SwitchBotCo2CheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/src/
      Handler: handler.lambda_handler
      Description: Checks SwitchBot CO2 sensor status every five minutes.
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:PutParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/CO2_ALERT_STATE
      Environment:
        Variables:
          TOKEN: !Ref Token
          CLIENT_SECRET: !Ref ClientSecret
          SLACK_WEBHOOK_URL: !Ref SlackWebhookUrl
          SWITCHBOT_API_BASE_URL: !Ref SwitchBotApiBaseUrl
          ALERT_STATE_PARAM: !Sub /${AWS::StackName}/CO2_ALERT_STATE
      Events:
        FiveMinuteSchedule:
          Type: Schedule
          Properties:
            Description: Runs the CO2 check every five minutes.
            Enabled: true
            Schedule: rate(5 minutes)
            Input: '{"action":"co2_check"}'

Outputs:
  SwitchBotCo2CheckFunctionArn:
    Description: ARN of the SwitchBot CO2 check Lambda function.
    Value: !GetAtt SwitchBotCo2CheckFunction.Arn
