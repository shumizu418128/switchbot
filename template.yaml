AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SwitchBot CO2 check Lambda scheduled by EventBridge.

Globals:
  Function:
    Runtime: python3.13
    Architectures:
      - x86_64
    MemorySize: 128
    Timeout: 60

Resources:
  SwitchBotCo2CheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/src/
      Handler: handler.lambda_handler
      Description: Checks SwitchBot CO2 sensor status every five minutes.
      Environment:
        Variables:
          TOKEN: !Sub "{{resolve:ssm:/${AWS::StackName}/TOKEN}}"
          CLIENT_SECRET: !Sub "{{resolve:ssm:/${AWS::StackName}/CLIENT_SECRET}}"
          SLACK_WEBHOOK_URL: !Sub "{{resolve:ssm:/${AWS::StackName}/SLACK_WEBHOOK_URL}}"
          SWITCHBOT_API_BASE_URL: !Sub "{{resolve:ssm:/${AWS::StackName}/SWITCHBOT_API_BASE_URL}}"
      Events:
        FiveMinuteSchedule:
          Type: Schedule
          Properties:
            Description: Runs the CO2 check every five minutes.
            Enabled: true
            Schedule: rate(5 minutes)
            Input: '{"action":"co2_check"}'

Outputs:
  SwitchBotCo2CheckFunctionArn:
    Description: ARN of the SwitchBot CO2 check Lambda function.
    Value: !GetAtt SwitchBotCo2CheckFunction.Arn
